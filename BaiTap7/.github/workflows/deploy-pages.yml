name: Deploy Pages

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Show deploy message
        run: echo "Deploying to GitHub Pages..."
      - name: Show pipeline execution time
        run: 'echo "Pipeline executed at: $(date)"'
      - name: Upload public folder as artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-folder
          path: public
